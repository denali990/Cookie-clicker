<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker Advanced</title>
    <style>
        body {
            background: linear-gradient(to bottom, #9b59b6, #8e44ad);
            color: white;
            text-align: center;
            font-family: 'Arial', sans-serif;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        h1 {
            font-size: 3em;
            margin-top: 20px;
        }
        .cookie {
            width: 200px;
            height: 200px;
            cursor: pointer;
        }
        .building {
            margin: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>Cookie Clicker Advanced</h1>
    <img class="cookie" src="cookie.png" alt="Giant Cookie" onclick="clickCookie()">
    <div id="buildings">
        <div class="building">🏠 Grandma</div>
        <div class="building">🏭 Factory</div>
        <div class="building">🏰 Castle</div>
        <div class="building">🏯 Temple</div>
        <div class="building">⛩️ Shrine</div>
        <div class="building">🌌 Bank</div>
        <div class="building">🏗️ Warehouse</div>
        <div class="building">🚀 Space Shuttle</div>
        <div class="building">👑 Kingdom</div>
        <div class="building">🎢 Roller Coaster</div>
        <div class="building">🎡 Ferris Wheel</div>
        <div class="building">🎠 Carousel</div>
    </div>
    <script>
        let cookies = 0;
        let buildings = {
            "Grandma": 1,
            "Factory": 5,
            "Castle": 10,
            "Temple": 20,
            "Shrine": 50,
            "Bank": 100,
            "Warehouse": 200,
            "Space Shuttle": 500,
            "Kingdom": 1000,
            "Roller Coaster": 2000,
            "Ferris Wheel": 5000,
            "Carousel": 10000
        };

        function clickCookie() {
            cookies += 1;
            document.title = `Cookies: ${cookies}`;
        }
    </script>
</body>
</html>
