<html>
<head>
    <title>Cookie Clicker Advanced</title>
</head>
<body>
    <h1>Cookie Clicker Advanced</h1>
    <button onclick="clickCookie()">Click me for cookies!</button>
    <p id="cookieCount"> Cookies: 0</p>
    <button onclick="unlockGrandmaApocalypse()">Unlock Grandma Apocalypse</button>
    <p id="grandmaStatus"> Grandma Apocalypse not unlocked.</p>
    <script>
        let cookies = 0;
        let grandmaApocalypseUnlocked = false;

        function clickCookie() {
            cookies++;
            document.getElementById('cookieCount').innerText = 'Cookies: ' + cookies;
        }

        function unlockGrandmaApocalypse() {
            grandmaApocalypseUnlocked = true;
            document.getElementById('grandmaStatus').innerText = 'Grandma Apocalypse unlocked!';
        }

        function enterSecretCode(code) {
            if (code === 'INFINITE_COOKIES') {
                cookies = Infinity;
                document.getElementById('cookieCount').innerText = 'Cookies: Infinite!';
            }
        }
    </script>
</body>
</html>
